#
# Server-only deployment file.
# Save this file as docker-compose.yml, edit the config block below, then run:
# docker compose up -d --build
#
# Values starting with NEXT_PUBLIC_ are baked into the frontend bundle during build.
#
x-blog-config: &blog-config
  NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
  SITE_URL: "http://localhost:3000"
  NEXT_PUBLIC_GITHUB_OWNER: "yysuni"
  NEXT_PUBLIC_GITHUB_REPO: "2025-blog-public"
  NEXT_PUBLIC_GITHUB_BRANCH: "main"
  NEXT_PUBLIC_GITHUB_APP_ID: ""
  NEXT_PUBLIC_GITHUB_ENCRYPT_KEY: "wudishiduomejimo"
  BLOG_SLUG_KEY: ""

x-build-config: &build-config
  NPM_REGISTRY: "https://registry.npmmirror.com"
  PNPM_VERSION: "10.24.0"

services:
  blog:
    image: 2025-blog:latest
    build:
      context: https://github.com/oldwangnewbe/2025-blog-public.git#main
      dockerfile: Dockerfile
      args:
        <<: [*blog-config, *build-config]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      <<: *blog-config
